version: '3.8'

services:
  fastapi-app:
    build: ./app
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - keycloak
    environment:
      MONGODB_URI: mongodb://mongodb:27017/mydatabase
      KEYCLOAK_SERVER_URL: http://keycloak:8080/auth
      KEYCLOAK_REALM: pastec
      KEYCLOAK_CLIENT_ID: pastec_server
      KEYCLOAK_CLIENT_SECRET: mysecret 
    networks:
      - backend

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: always
    environment:
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: admin
    command:
      - start-dev
      - "--db=dev-h2"
      - "--db-url=jdbc:h2:file:/opt/keycloak/data/h2/keycloakdb;AUTO_SERVER=TRUE"
    volumes:
      - keycloak_data:/opt/keycloak/data/h2
    ports:
      - "8080:8080"
    networks:
      - backend

volumes:
  mongo_data:
  keycloak_data:

networks:
  backend:
